<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="hugertest.js"></script>
     <script type="module" src="actualcode.js"></script>
    <link
      rel="stylesheet"
      href="joinstyling.css"
    />
    <title>This is tab!</title>
    <meta
      name="what this do?"
      content="what this do?"
    />
  </head>
  <body>
    <div id="myDIV" hidden>Room Created!</div>

    <div id="box">

      <div>
        <div class="title">
          <div id="nochange">Room ID:</div>
          <div id="change">Generating...</div>
          <div id="role-display" style="display: none;">You are... </div>
          <div id="role-target" style="display: none;">You're target is...</div>
        </div>
        
        <div id="host-box">
                <div id="player-count">Current Players
                  <div id="host-list">...</div>
                </div>

                <div id="timer-display">30</div>
        </div>
        <br>


        <div class="grid">
          <a onclick="mythingy()" class="button" id="begin-btn">GIVE ROLES</a>
          <a onclick="mytimer()" class="button" id="timer-btn">TIMER</a>
          <a href="join or create.html" onclick="backBtn()" class="button" id="back-btn">BACK</a> 
          <a button id="stop-btn" style="display:none;" onclick="openKillPopup()" class="button">SHOTS</a>
        </div>
      </div>

    </div>

        <div id="kill-popup" style="display: none;">
          <div id="kill-popup-inner">
            <h2>Choose a target</h2>
            <div id="kill-list"></div>
            <button onclick="closeKillPopup()" class="cancel-btn">Cancel</button>
          </div>
        </div>
  </body>
</html>
